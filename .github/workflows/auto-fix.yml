name: Auto-Fix Failing Tests with Claude

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    if: >
      github.actor != 'github-actions[bot]' &&
      !startsWith(github.head_ref, 'claude-fix/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        id: run_tests
        continue-on-error: true
        run: |
          npm test -- --no-coverage 2>&1 | tee test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Check if tests failed
        id: check_failure
        run: |
          if [ "${{ steps.run_tests.outputs.exit_code }}" != "0" ]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
          else
            echo "failed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Capture recent diff
        if: steps.check_failure.outputs.failed == 'true'
        run: |
          git diff HEAD~1 HEAD -- '*.js' '*.ts' 2>/dev/null > recent-diff.txt || \
          git show --stat HEAD > recent-diff.txt

      - name: Ask Claude for a fix
        if: steps.check_failure.outputs.failed == 'true'
        id: claude_fix
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          TEST_OUTPUT=$(cat test-output.txt)
          DIFF=$(cat recent-diff.txt)

          SOURCE_FILES=$(find src -name '*.js' | head -10 | while read f; do
            echo "### $f"
            cat "$f"
            echo ""
          done)

          PROMPT="You are a code-fixing assistant embedded in a CI/CD pipeline.\n\nA test suite has just failed. Your job is to:\n1. Identify the root cause of the failing test(s).\n2. Propose the minimal fix needed to make the tests pass without changing any test expectations.\n3. Return ONLY a JSON object in this exact shape -- no markdown fences, no explanation outside the JSON:\n\n{\n  \"explanation\": \"A 2-3 sentence explanation of the bug and fix.\",\n  \"files\": [\n    {\n      \"path\": \"relative/path/to/file.js\",\n      \"content\": \"entire new file content\"\n    }\n  ]\n}\n\n## Failing test output\n\n$TEST_OUTPUT\n\n## Recent git diff\n\n$DIFF\n\n## Source files\n\n$SOURCE_FILES"

          RESPONSE=$(curl -s https://api.anthropic.com/v1/messages \
            -H "x-api-key: $CLAUDE_API_KEY" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -d "$(jq -n \
              --arg model "claude-sonnet-4-6" \
              --arg prompt "$PROMPT" \
              '{model: $model, max_tokens: 2048, messages: [{role: "user", content: $prompt}]}'
            )")

          echo "Claude raw response:"
          echo "$RESPONSE"

          CLAUDE_TEXT=$(echo "$RESPONSE" | jq -r '.content[0].text // empty')

          if [ -z "$CLAUDE_TEXT" ]; then
            echo "::error::Claude returned an empty response."
            exit 1
          fi

          echo "$CLAUDE_TEXT" > claude-response.json
          echo "claude_response_file=claude-response.json" >> "$GITHUB_OUTPUT"

      - name: Apply fix and open PR
        if: steps.check_failure.outputs.failed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESPONSE_FILE="${{ steps.claude_fix.outputs.claude_response_file }}"
          EXPLANATION=$(jq -r '.explanation' "$RESPONSE_FILE")
          FILE_COUNT=$(jq '.files | length' "$RESPONSE_FILE")

          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "::warning::Claude returned no file changes."
            exit 0
          fi

          BRANCH="claude-fix/$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          for i in $(seq 0 $(($FILE_COUNT - 1))); do
            FILE_PATH=$(jq -r ".files[$i].path" "$RESPONSE_FILE")
            FILE_CONTENT=$(jq -r ".files[$i].content" "$RESPONSE_FILE")
            mkdir -p "$(dirname "$FILE_PATH")"
            echo "$FILE_CONTENT" > "$FILE_PATH"
            git add "$FILE_PATH"
          done

          git commit -m "fix: apply Claude suggested fix for failing tests"
          git push origin "$BRANCH"

          gh pr create \
            --title "fix: Claude suggested fix for failing tests" \
            --body "$EXPLANATION" \
            --base "${{ github.ref_name }}" \
            --head "$BRANCH" || true

          echo "::notice::Fix PR opened from branch $BRANCH"
